<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Schedule - Austin Strong</title>
    <link rel="icon" href="../../assets/images/pfp-nine-sided-cookie.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=2">

    <!-- Discord & Open Graph Meta Tags -->
    <meta name="theme-color" content="#00704a">
    <meta property="og:title" content="Austin Strong - Starbucks Schedule">
    <meta property="og:description" content="View my Starbucks schedule.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://astrong.xyz/schedule/starbucks/">
    <meta property="og:image" content="https://astrong.xyz/assets/images/pfp-nine-sided-cookie.png">
    <meta name="twitter:card" content="summary_large_image">
</head>

<body>
    <!-- Back Arrow -->
    <a href="https://schedule.astrong.xyz" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Schedule
    </a>

    <div class="calendar-container">

        <!-- Header -->
        <header class="calendar-header">
            <div class="brand">
                <div class="logo">
                    <img src="../../assets/images/starbucks-logo.svg" alt="Starbucks Logo" width="36" height="36">
                </div>
                <div>
                    <h1>Starbucks</h1>
                    <p class="subtitle">Shift Calendar</p>
                </div>
            </div>

            <div class="header-right-controls">
                <div class="navigation-controls">
                    <button id="prev-month" aria-label="Previous Month">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2 id="current-month-year">June 2026</h2>
                    <button id="next-month" aria-label="Next Month">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <button id="settings-toggle" class="settings-toggle" aria-label="Toggle Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Collapsible Settings Tray -->
        <div id="settings-tray" class="settings-tray hidden">
            <div class="settings-group">
                <span class="settings-label">Time Format</span>
                <div class="toggle-group">
                    <button id="btn-format-12h" class="toggle-option active">12H</button>
                    <button id="btn-format-24h" class="toggle-option">24H</button>
                </div>
            </div>
        </div>

        <!-- Calendar Card -->
        <main class="calendar-card">
            <!-- View Switcher -->
            <div class="view-switcher-container">
                <div class="view-switcher">
                    <button id="btn-view-month" class="switcher-btn active">Month</button>
                    <button id="btn-view-agenda" class="switcher-btn">Agenda</button>
                </div>
            </div>

            <!-- Month Calendar Grid View -->
            <div id="month-view-container">
                <!-- Weekdays Label Header -->
                <div class="weekdays-grid">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>

                <!-- Calendar Days Grid -->
                <div id="calendar-days" class="days-grid">
                    <!-- Injected dynamically by script.js -->
                </div>
            </div>

            <!-- Agenda/List View Container -->
            <div id="agenda-view-container" class="hidden">
                <div id="agenda-list" class="agenda-list">
                    <!-- Injected dynamically by script.js -->
                </div>
            </div>
        </main>

        <!-- Selected Day Shift Detail Panel -->
        <section class="details-card" id="details-card">
            <div class="details-placeholder" id="details-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar" style="margin-bottom: 0.5rem;">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <p>Select another day to view more information.</p>
            </div>
            <div class="details-content hidden" id="details-content">
                <div class="details-header">
                    <h3 id="details-date">Sunday, June 28</h3>
                </div>
                <div class="details-body">
                    <div class="detail-row time-row">
                        <span class="detail-label">Hours</span>
                        <div class="detail-val">
                            <span id="details-time">6:00 AM - 2:30 PM</span>
                            <span class="duration" id="details-duration">(8.5 hrs)</span>
                        </div>
                    </div>

                    <div class="detail-row" id="details-notes-row">
                        <span class="detail-label">Notes</span>
                        <span class="detail-val note-val" id="details-notes">Opening Shift</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="schedule.js"></script>
    <script src="script.js"></script>
</body>

</html>
