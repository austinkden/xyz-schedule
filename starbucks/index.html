<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Schedule - Austin Strong</title>
    <link rel="icon" href="../../assets/images/pfp-nine-sided-cookie.png" type="image/png">
    <link rel="stylesheet" href="style.css">

    <!-- Discord & Open Graph Meta Tags -->
    <meta name="theme-color" content="#00704a">
    <meta property="og:title" content="Austin Strong - Starbucks Schedule">
    <meta property="og:description" content="View my Starbucks schedule.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://astrong.xyz/schedule/starbucks/">
    <meta property="og:image" content="https://astrong.xyz/assets/images/pfp-nine-sided-cookie.png">
    <meta name="twitter:card" content="summary_large_image">
</head>

<body>
    <div class="calendar-container">
        <!-- Back Arrow -->
        <a href="https://schedule.astrong.xyz" class="back-link">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor" />
            </svg>
            Back to Schedules
        </a>

        <!-- Header -->
        <header class="calendar-header">
            <div class="brand">
                <div class="logo">
                    <img src="../../assets/images/starbucks-logo.svg" alt="Starbucks Logo" width="36" height="36">
                </div>
                <div>
                    <h1>Starbucks</h1>
                    <p class="subtitle">Shift Calendar</p>
                </div>
            </div>

            <div class="header-right-controls">
                <div class="navigation-controls">
                    <button id="prev-month" aria-label="Previous Month">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor" />
                        </svg>
                    </button>
                    <h2 id="current-month-year">June 2026</h2>
                    <button id="next-month" aria-label="Next Month">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor" />
                        </svg>
                    </button>
                </div>

                <button id="settings-toggle" class="settings-toggle" aria-label="Toggle Settings">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path
                            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                            fill="currentColor" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Collapsible Settings Tray -->
        <div id="settings-tray" class="settings-tray hidden">
            <div class="settings-group">
                <span class="settings-label">Time Format</span>
                <div class="toggle-group">
                    <button id="btn-format-12h" class="toggle-option active">12H</button>
                    <button id="btn-format-24h" class="toggle-option">24H</button>
                </div>
            </div>
        </div>

        <!-- Calendar Card -->
        <main class="calendar-card">
            <!-- View Switcher -->
            <div class="view-switcher-container">
                <div class="view-switcher">
                    <button id="btn-view-month" class="switcher-btn active">Month</button>
                    <button id="btn-view-agenda" class="switcher-btn">Agenda</button>
                </div>
            </div>

            <!-- Month Calendar Grid View -->
            <div id="month-view-container">
                <!-- Weekdays Label Header -->
                <div class="weekdays-grid">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>

                <!-- Calendar Days Grid -->
                <div id="calendar-days" class="days-grid">
                    <!-- Injected dynamically by script.js -->
                </div>
            </div>

            <!-- Agenda/List View Container -->
            <div id="agenda-view-container" class="hidden">
                <div id="agenda-list" class="agenda-list">
                    <!-- Injected dynamically by script.js -->
                </div>
            </div>
        </main>

        <!-- Selected Day Shift Detail Panel -->
        <section class="details-card" id="details-card">
            <div class="details-placeholder" id="details-placeholder">
                <svg viewBox="0 0 24 24" width="40" height="40" style="opacity: 0.5; margin-bottom: 0.5rem;">
                    <path
                        d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"
                        fill="currentColor" />
                </svg>
                <p>Select a day on the calendar to view detailed shift information.</p>
            </div>
            <div class="details-content hidden" id="details-content">
                <div class="details-header">
                    <h3 id="details-date">Sunday, June 28</h3>
                    <span class="status-badge" id="details-badge">Shift Scheduled</span>
                </div>
                <div class="details-body">
                    <div class="detail-row time-row">
                        <span class="detail-label">Hours</span>
                        <div class="detail-val">
                            <span id="details-time">6:00 AM - 2:30 PM</span>
                            <span class="duration" id="details-duration">(8.5 hrs)</span>
                        </div>
                    </div>

                    <div class="detail-row" id="details-notes-row">
                        <span class="detail-label">Notes</span>
                        <span class="detail-val note-val" id="details-notes">Opening Shift</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="schedule.js"></script>
    <script src="script.js"></script>
</body>

</html>
